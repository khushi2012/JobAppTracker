<!DOCTYPE html>
<html>
<head>
  <title>Saved Jobs</title>
<style>
  body {
    font-family: Arial, sans-serif;
    width: 320px;
    padding: 10px;
    background: #f5f5f5;
  }

  h2 {
    margin-bottom: 10px;
  }

  #jobs {
    max-height: 400px;
    overflow-y: auto;
  }

  .job {
    background: white;
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  .title {
    font-weight: bold;
    font-size: 14px;
    margin-bottom: 4px;
  }

  .meta {
    font-size: 12px;
    color: #555;
    margin-bottom: 6px;
  }

  a {
    font-size: 12px;
    color: #007bff;
    text-decoration: none;
  }

  select {
    margin-top: 6px;
    width: 100%;
    padding: 4px;
    border-radius: 4px;
  }
  button {
  margin-top: 6px;
  width: 100%;
  padding: 5px;
  background: #ff4d4d;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}
#filter {
  width: 100%;
  margin-bottom: 10px;
  padding: 5px;
}
#search {
  width: 100%;
  padding: 6px;
  margin-bottom: 8px;
  border-radius: 5px;
  border: 1px solid #ccc;
}
</style>
</head>

<body>
  <h2>Saved Jobs</h2>
  <input id="search" type="text" placeholder="Search jobs..." />
  <select id="filter">
  <option value="All">All</option>
  <option value="Applied">Applied</option>
  <option value="Interview">Interview</option>
  <option value="Offer">Offer</option>
  <option value="Rejected">Rejected</option>
</select>
  <div id="jobs"></div>

  <script src="src/popup.js"></script>
</body>
</html>
